<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin CMS — تسجيل الدخول</title>
  <link rel="stylesheet" href="/admin_cms/styles.css">
</head>
<body class="admin-cms-page">
  <main id="admin-app">
    <section class="auth-card">
      <div class="auth-top">
        <img src="/assets/img/شعار نشرة الحاسوبي باللون الازرق.png" alt="logo" class="logo"/>
        <h2>تسجيل الدخول إلى لوحة الإدارة</h2>
      </div>
      <form id="login-form" class="auth-form" autocomplete="on">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input id="email" type="email" required class="input" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input id="password" type="password" required class="input" placeholder="••••••••">
        </div>
        <div class="auth-actions">
          <button id="btn-login" class="btn btn-primary">تسجيل الدخول</button>
        </div>
        <div id="login-msg" class="muted"></div>
      </form>
    </section>
  </main>
  <footer>
    <div class="footer-bottom">
      &copy; <span class="footer-year">2026</span> نشرة الحاسوبي. جميع الحقوق محفوظة.
    </div>
  </footer>
  <script src="/js/footer-year.js"></script>
  <script type="module" src="/admin_cms/login.js"></script>
</body>
</html>
