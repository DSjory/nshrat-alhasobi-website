<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>محرر النشرة — لوحة الإدارة</title>
  <link rel="stylesheet" href="/admin_cms/styles.css">
</head>
<body class="admin-cms-page">
  <main class="editor-shell">
    <section class="editor-main" id="editor-main">
      <h2 id="editor-title">محرر النشرة</h2>
      <div id="meta" class="meta">
        <div class="form-row"><label class="label">العنوان (عربي)</label><input id="title-ar" class="input"></div>
        <div class="form-row"><label class="label">العنوان (EN)</label><input id="title-en" class="input"></div>
        <div class="form-row meta-row">
          <div style="flex:1"><label class="label">رقم الإصدار</label><input id="edition" class="input" type="number"></div>
          <div style="width:220px"><label class="label">تاريخ الإصدار</label><input id="issue-date" class="input" type="date"></div>
        </div>
        <div class="form-row"><label class="label">التصنيف</label><select id="category" class="input"><option value="">-- اختر --</option></select></div>
        <div class="form-row"><label class="label">صورة الغلاف</label>
          <div class="uploader" id="cover-uploader">
            <input id="cover-file" type="file" accept="image/*">
            <div id="cover-preview"></div>
            <div id="cover-status" class="muted"></div>
          </div>
        </div>
        <div class="form-row"><label><input id="is-published" type="checkbox"> منشور</label></div>
        <div class="form-row editor-actions"><button id="save-meta" class="btn btn-primary">حفظ بيانات النشرة</button> <button id="delete-news" class="btn">حذف العدد</button></div>
      </div>

      <hr>
      <h3>أقسام النشرة</h3>
      <div>
        <div class="editor-actions" style="margin-bottom:8px">
          <select id="add-section-type" class="input" style="flex:1"></select>
          <button id="btn-add-section" class="btn btn-primary">+ إضافة قسم</button>
        </div>
        <div id="sections" class="section-list"></div>
      </div>

      <div id="section-editor-area"></div>
    </section>

    <aside class="editor-aside">
      <h4>مساعدة سريعة</h4>
      <p class="muted">أضف الأقسام المطلوبة ثم اضغط على اسم القسم لتحرير محتواه. احفظ بيانات النشرة أولاً حتى تتمكن من رفع الملفات وتحويلها إلى روابط عامة.</p>
      <div class="form-row">
        <button id="publish-all" class="btn btn-primary">حفظ كل التغييرات</button>
      </div>
    </aside>
  </main>

  <div class="editor-back-bottom">
    <a class="btn btn-primary back-dashboard-btn" href="/admin_cms/dashboard.html">العودة إلى لوحة التحكم</a>
  </div>

  <footer>
    <div class="footer-bottom">
      &copy; <span class="footer-year">2026</span> نشرة الحاسوبي. جميع الحقوق محفوظة.
    </div>
  </footer>
  <script src="/js/footer-year.js"></script>

  <script type="module" src="/admin_cms/editor.js"></script>
</body>
</html>
