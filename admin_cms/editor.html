<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>محرر النشرة — لوحة الإدارة</title>
  <script type="module" src="/admin_cms/js/auth-guard.js"></script>
  <link rel="stylesheet" href="/admin_cms/styles.css">
</head>
<body class="admin-cms-page">
  <div class="admin-wrapper">
    <main class="editor-shell">
      
      <!-- Right Sidebar Area -->
      <aside class="editor-aside">
        <div class="sidebar-logo">
           <img src="/assets/img/شعار نشرة الحاسوبي باللون الازرق.png" alt="شعار النشرة">
        </div>
        <h4>مساعدة سريعة</h4>
        <p class="muted" style="margin-bottom: 24px; font-size: 0.9rem;">أضف الأقسام المطلوبة ثم اضغط على اسم القسم لتحرير محتواه. احفظ بيانات النشرة أولاً حتى تتمكن من رفع الملفات.</p>
        
        <div class="form-row">
          <button id="publish-all" class="btn btn-primary" style="width: 100%;">حفظ كل التغييرات</button>
        </div>
        <div class="form-row" style="margin-top: 8px;">
           <a class="btn" style="display:block; width: 100%; text-align:center; text-decoration:none;" href="/admin_cms/dashboard.html">العودة للوحة التحكم</a>
        </div>
        
        <!-- User block injected dynamically via auth-guard -->
        <div class="sidebar-user-block" id="user-profile-widget">
        </div>
      </aside>

      <!-- Left Main Content Area -->
      <section class="editor-main" id="editor-main">
        <header class="dashboard-header">
           <div class="header-titles" style="text-align: right;">
              <p style="color: var(--muted-color); font-size: 0.9rem; margin: 0;">العودة إلى <a href="/admin_cms/dashboard.html">لوحة التحكم</a></p>
              <h1 id="editor-title" style="margin: 0;">محرر النشرة</h1>
           </div>
           <div class="header-actions">
              <button id="save-meta" class="btn btn-primary">حفظ بيانات النشرة</button>
              <button id="delete-news" class="btn" style="color:#dc2626; border-color:#dc2626; background:#fef2f2;">حذف العدد</button>
           </div>
        </header>

        <div id="meta" class="meta" style="margin: 0; max-width: 100%;">
          <div class="form-row"><label class="label">العنوان (عربي)</label><input id="title-ar" class="input"></div>
          <div class="form-row"><label class="label">العنوان (EN)</label><input id="title-en" class="input"></div>
          <div class="form-row meta-row">
            <div style="flex:1"><label class="label">رقم الإصدار</label><input id="edition" class="input" type="number"></div>
            <div style="width:220px"><label class="label">تاريخ الإصدار</label><input id="issue-date" class="input" type="date"></div>
          </div>
          <div class="form-row"><label class="label">التصنيف</label><select id="category" class="input"><option value="">-- اختر --</option></select></div>
          <div class="form-row"><label class="label">صورة الغلاف</label>
            <div class="uploader" id="cover-uploader">
              <input id="cover-file" type="file" accept="image/*">
              <div id="cover-preview"></div>
              <div id="cover-status" class="muted"></div>
            </div>
          </div>
          <div class="form-row"><label><input id="is-published" type="checkbox"> منشور</label></div>
        </div>

        <hr>
        <h3>أقسام النشرة</h3>
        <div>
          <div class="editor-actions" style="margin-bottom:8px">
            <select id="add-section-type" class="input" style="flex:1"></select>
            <button id="btn-add-section" class="btn btn-primary">+ إضافة قسم</button>
          </div>
          <div id="sections" class="section-list"></div>
        </div>

        <div id="section-editor-area"></div>
      </section>

    </main>
  </div>

  <script src="/js/footer-year.js"></script>
  <script type="module" src="/js/layout.js"></script>

  <script type="module" src="/admin_cms/editor.js"></script>
</body>
</html>
