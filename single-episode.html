    <script type="module">

    <script type="module">
      // Load dependencies as modules to enforce execution order after supabase initializes
      import '/js/newsletter-data.js';
      import '/js/newsletter-render.js';
      
      // Delay initialization slightly to ensure all exports are mapped
      window.addEventListener('DOMContentLoaded', () => {
         setTimeout(() => {
           if (window.initNewsletterPage) {
             window.initNewsletterPage('id');
           }
         }, 50);
      });
    </script>

<script>
  // Helper: ensure dark mode is synced with localStorage on page load
  document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark-mode');
      document.body.classList.add('dark-mode');
    }
  });
</script>
